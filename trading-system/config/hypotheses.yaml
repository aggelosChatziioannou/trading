# =============================================================
# HYPOTHESIS DEFINITIONS
# =============================================================
# EACH HYPOTHESIS MUST HAVE: theory_basis, entry, exit, stop_loss, time_horizon
# NONE of these should be derived from backtest results.
# Changes require THEORETICAL justification, not empirical.

strategies:

  # ============================================================
  # STRATEGY 1: MEAN REVERSION WITH SENTIMENT CONFIRMATION
  # ============================================================
  mean_reversion_sentiment:
    id: "MRS-001"
    name: "Mean Reversion with Sentiment Confirmation"
    theory_basis: |
      Markets overreact to short-term news, creating temporary mispricings.
      When price deviates significantly from its mean AND sentiment is
      disproportionately negative (for longs) or positive (for shorts),
      the reversion probability increases because the move was sentiment-driven
      rather than fundamental. Academic basis: De Bondt & Thaler (1985)
      overreaction hypothesis, Tetlock (2007) media sentiment impact.

    entry_conditions:
      long:
        - "bb_position < 0.1"           # Price near lower Bollinger Band
        - "rsi_14 < 30"                 # RSI oversold
        - "sent_24h < -0.3"             # Negative sentiment (overreaction indicator)
        - "sent_momentum < -0.2"        # Sentiment getting MORE negative (panic)
        - "volume_ratio > 1.5"          # Above-average volume (capitulation signal)
        - "adx_14 < 25"                 # NOT in strong trend (mean reversion works in ranges)
      short:
        - "bb_position > 0.9"
        - "rsi_14 > 70"
        - "sent_24h > 0.3"
        - "sent_momentum > 0.2"
        - "volume_ratio > 1.5"
        - "adx_14 < 25"

    exit_conditions:
      - "bb_position crosses 0.5"       # Price returns to mean
      - "rsi_14 crosses 50"             # RSI normalizes
      - "holding_period > 5 days"       # Time-based exit

    stop_loss:
      method: "atr"
      multiplier: 2.0                   # 2x ATR accommodates normal volatility
      theory: "2 ATR accommodates normal volatility; beyond that, the thesis is broken"

    take_profit:
      method: "atr"
      multiplier: 3.0                   # 3:1 reward-risk by design

    time_horizon: "1-5 days"
    max_positions: 2
    confidence_threshold: 0.65

  # ============================================================
  # STRATEGY 2: NEWS MOMENTUM
  # ============================================================
  news_momentum:
    id: "NM-001"
    name: "News Momentum"
    theory_basis: |
      Significant news events create information asymmetry. The initial price
      reaction often underreacts to truly significant news because:
      1) Liquidity providers widen spreads (slower price discovery)
      2) Many participants wait for confirmation
      3) Institutional investors take time to analyze and act
      This creates a 1-3 day drift in the direction of the initial move.
      Academic basis: Chan (2003) momentum of individual stocks,
      Tetlock et al. (2008) quantitative content analysis.

    entry_conditions:
      long:
        - "sent_4h > 0.6"               # Strong positive recent sentiment
        - "sent_volume_4h >= 3"          # At least 3 articles (real event, not noise)
        - "sent_source_agreement > 0.7"  # Multiple sources agree
        - "roc_5 > 0"                    # Price already moving up (confirmation)
        - "volume_ratio > 2.0"           # Significant volume spike
      short:
        - "sent_4h < -0.6"
        - "sent_volume_4h >= 3"
        - "sent_source_agreement > 0.7"
        - "roc_5 < 0"
        - "volume_ratio > 2.0"

    exit_conditions:
      - "sent_momentum reverses sign"    # Sentiment losing steam
      - "volume_ratio < 1.0"            # Volume drying up
      - "holding_period > 3 days"

    stop_loss:
      method: "atr"
      multiplier: 1.5
      theory: "Tighter stop because momentum trades should work quickly or not at all"

    take_profit:
      method: "trailing"
      trail_atr: 1.5

    time_horizon: "1-3 days"
    max_positions: 2
    confidence_threshold: 0.70

  # ============================================================
  # STRATEGY 3: SENTIMENT DIVERGENCE
  # ============================================================
  sentiment_divergence:
    id: "SD-001"
    name: "Sentiment-Price Divergence"
    theory_basis: |
      When price makes new highs but sentiment deteriorates (or vice versa),
      it signals that the "smart money" narrative is shifting before price.
      News leads price by 1-3 days on average because:
      1) Journalists have access to industry insiders
      2) Analyst sentiment shifts precede formal downgrades
      3) Social media captures grassroots sentiment changes
      This is analogous to the classic price-volume divergence but using
      sentiment as the confirming indicator.
      Academic basis: Baker & Wurgler (2006) investor sentiment.

    entry_conditions:
      long:
        - "price_vs_sma50 < -1.0"       # Price below SMA50 by 1+ ATR
        - "sent_7d < 0"                  # Negative sentiment backdrop
        - "sent_momentum > 0.15"         # BUT sentiment is IMPROVING
        - "price_sent_divergence > 0.3"  # Significant divergence signal
      short:
        - "price_vs_sma50 > 1.0"
        - "sent_7d > 0"
        - "sent_momentum < -0.15"
        - "price_sent_divergence < -0.3"

    exit_conditions:
      - "price_sent_divergence crosses 0"
      - "holding_period > 7 days"

    stop_loss:
      method: "atr"
      multiplier: 2.5
      theory: "Wider stop for divergence trades — they take longer to play out"

    take_profit:
      method: "atr"
      multiplier: 4.0

    time_horizon: "3-7 days"
    max_positions: 1
    confidence_threshold: 0.60

  # ============================================================
  # STRATEGY 4: VOLATILITY BREAKOUT
  # ============================================================
  volatility_breakout:
    id: "VB-001"
    name: "Volatility Breakout"
    theory_basis: |
      After periods of low volatility (consolidation), markets tend to
      make directional moves when volatility expands. This is because:
      1) Low volatility = equilibrium between buyers and sellers
      2) A catalyst breaks the equilibrium → stop-loss cascades
      3) The initial breakout direction tends to persist
      Using Keltner Channels (EMA ± ATR multiplier) rather than Bollinger
      because ATR is more robust to gaps and extreme moves.
      Academic basis: Mandelbrot (1963) fat tails, Cont (2001) volatility clustering.

    entry_conditions:
      long:
        - "bb_width at 20-day low"       # Squeeze condition
        - "close > upper_keltner"        # Breakout above Keltner Channel
        - "adx_14 > 20"                 # Trend starting to form
        - "volume_ratio > 1.5"          # Volume confirms breakout
        - "sent_24h >= -0.2"            # Sentiment not strongly against
      short:
        - "bb_width at 20-day low"
        - "close < lower_keltner"
        - "adx_14 > 20"
        - "volume_ratio > 1.5"
        - "sent_24h <= 0.2"

    exit_conditions:
      - "adx_14 < 15"                   # Trend fading
      - "close crosses back inside keltner"
      - "holding_period > 10 days"

    stop_loss:
      method: "keltner_midline"
      theory: "If price falls back to the EMA midline, the breakout failed"

    take_profit:
      method: "trailing"
      trail_atr: 2.0

    time_horizon: "3-10 days"
    max_positions: 2
    confidence_threshold: 0.65

  # ============================================================
  # STRATEGY 5: POST-EARNINGS ANNOUNCEMENT DRIFT
  # ============================================================
  earnings_drift:
    id: "PEAD-001"
    name: "Post-Earnings Announcement Drift"
    theory_basis: |
      One of the most well-documented anomalies in finance (Bernard & Thomas, 1989).
      After earnings announcements, stocks tend to CONTINUE drifting in the
      direction of the earnings surprise for 60-90 days because:
      1) Analysts are slow to update estimates
      2) Institutional investors have capacity constraints
      3) Behavioral anchoring to pre-earnings expectations
      We enhance this with LLM sentiment analysis of earnings calls
      to gauge not just the numbers but management tone and guidance quality.

    entry_conditions:
      long:
        - "earnings_surprise > 5%"       # Beat estimates by 5%+
        - "sent_4h > 0.4"               # Positive reaction to earnings
        - "volume_ratio > 3.0"          # Massive volume on earnings day
        - "roc_5 > 0"                   # Price moving up post-earnings
        - "guidance_sentiment > 0.3"    # Forward guidance is positive
      short:
        - "earnings_surprise < -5%"
        - "sent_4h < -0.4"
        - "volume_ratio > 3.0"
        - "roc_5 < 0"
        - "guidance_sentiment < -0.3"

    exit_conditions:
      - "holding_period > 20 days"
      - "sent_momentum reverses strongly"

    stop_loss:
      method: "atr"
      multiplier: 3.0
      theory: "Wide stop — PEAD is a slow anomaly, need room to breathe"

    take_profit:
      method: "atr"
      multiplier: 5.0

    time_horizon: "5-20 days"
    max_positions: 2
    confidence_threshold: 0.70

  # ============================================================
  # STRATEGY 6: VWAP MEAN REVERSION (Intraday)
  # ============================================================
  vwap_reversion:
    id: "VWAP-001"
    name: "VWAP Mean Reversion"
    theory_basis: |
      VWAP represents the "fair value" for institutional traders.
      When price deviates significantly from VWAP:
      1) Institutional buy programs kick in (buying below VWAP)
      2) Institutional sell programs kick in (selling above VWAP)
      3) This creates a gravitational pull back to VWAP
      Works best in the first 2 hours and last hour of trading when
      institutional activity is highest.

    entry_conditions:
      long:
        - "vwap_distance < -1.5"         # Price 1.5+ ATR below VWAP
        - "volume_ratio > 1.2"          # Above-average volume
        - "time is 10:00-11:30 OR 14:30-15:30 ET"
        - "adx_14 < 30"                 # Not a strong trend day
      short:
        - "vwap_distance > 1.5"
        - "volume_ratio > 1.2"
        - "time is 10:00-11:30 OR 14:30-15:30 ET"
        - "adx_14 < 30"

    exit_conditions:
      - "vwap_distance crosses 0"
      - "market_close - 15min"

    stop_loss:
      method: "atr"
      multiplier: 1.0
      theory: "Tight intraday stop — if VWAP reversion doesn't start quickly, thesis fails"

    take_profit:
      method: "vwap"
      target: 0

    time_horizon: "intraday (1-4 hours)"
    max_positions: 3
    confidence_threshold: 0.60

  # ============================================================
  # STRATEGY 7: OVERNIGHT GAP FADE
  # ============================================================
  overnight_gap:
    id: "GAP-001"
    name: "Overnight Gap Fade"
    theory_basis: |
      Gaps created by overnight news/pre-market activity often partially
      fill during regular trading hours because:
      1) Pre-market has thin liquidity → exaggerated moves
      2) Regular session brings in the full participant base
      3) Market makers profit from fading extreme gaps
      4) Retail traders create the gap, institutions fade it
      Filter: ONLY fade gaps NOT caused by material news (earnings, M&A).

    entry_conditions:
      fade_gap_up:
        - "gap_size > 1.5%"
        - "sent_24h < 0.4"              # NOT driven by major positive news
        - "sent_volume_4h < 3"          # Low article count → not a real event
        - "time is 9:35-10:00 ET"
        - "volume_ratio > 1.5 in first 5 min"
      fade_gap_down:
        - "gap_size < -1.5%"
        - "sent_24h > -0.4"
        - "sent_volume_4h < 3"
        - "time is 9:35-10:00 ET"
        - "volume_ratio > 1.5 in first 5 min"

    exit_conditions:
      - "gap is 50% filled"
      - "11:00 ET"

    stop_loss:
      method: "percentage"
      value: 0.5
      theory: "If gap EXTENDS, the move is real and we're wrong"

    take_profit:
      method: "gap_fill"
      fill_percentage: 50

    time_horizon: "intraday (30min - 2 hours)"
    max_positions: 2
    confidence_threshold: 0.55
